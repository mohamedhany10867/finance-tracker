<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💰 Finance Tracker Pro</title>
    <meta name="theme-color" content="#4f6ef7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finance">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #f4f6fc;
            --card-bg: rgba(255,255,255,0.85);
            --card-border: rgba(255,255,255,0.6);
            --text: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --primary: #4f6ef7;
            --primary-hover: #3b54d4;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --success-bg: rgba(16,185,129,0.1);
            --danger-bg: rgba(239,68,68,0.08);
            --shadow: 0 8px 30px rgba(0,0,0,0.06);
            --radius: 18px;
            --transition: 0.2s ease;
            --chart-grid: #e2e8f0;
            --income-color: #10b981;
            --expense-color: #ef4444;
            --blur: blur(14px);
        }
        .dark {
            --bg: #0b1120;
            --card-bg: rgba(30,41,59,0.8);
            --card-border: rgba(255,255,255,0.08);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #1e293b;
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --chart-grid: #334155;
            --success-bg: rgba(16,185,129,0.15);
            --danger-bg: rgba(239,68,68,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all var(--transition);
            padding: 12px;
            display: flex;
            justify-content: center;
        }
        .container { max-width: 950px; width: 100%; display: flex; flex-direction: column; gap: 16px; }
        .card {
            background: var(--card-bg); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur); border-radius: var(--radius);
            padding: 20px 22px; box-shadow: var(--shadow);
            border: 1px solid var(--card-border); transition: all var(--transition);
        }
        header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 1.7rem; font-weight: 700; }
        button, .btn {
            cursor: pointer; border: none; border-radius: 12px; padding: 10px 18px;
            font-size: 0.85rem; font-weight: 600; transition: all var(--transition);
            display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
            touch-action: manipulation; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 7px 14px; font-size: 0.78rem; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .summary-item {
            text-align: center; padding: 16px 10px; border-radius: 16px;
            background: var(--card-bg); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur); border: 1px solid var(--card-border);
        }
        .summary-item .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing:0.5px; color:var(--text-secondary); }
        .summary-item .value { font-size: 1.6rem; font-weight: 700; }
        .value.positive { color: var(--income-color); } .value.negative { color: var(--expense-color); }
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; align-items: end; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        input, select {
            padding: 12px 14px; border-radius: 12px; border: 2px solid var(--border);
            font-size: 0.95rem; background: var(--card-bg); color: var(--text);
            font-family: inherit; width: 100%; backdrop-filter: blur(6px);
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        .transaction-list { list-style: none; display: flex; flex-direction: column; gap: 8px; max-height: 420px; overflow-y: auto; padding-right: 4px; }
        .transaction-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 14px; border-radius: 14px; background: var(--card-bg);
            border: 1px solid var(--border); gap: 10px; flex-wrap: wrap;
        }
        .transaction-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .icon-income { background: rgba(16,185,129,0.15); color: var(--income-color); }
        .icon-expense { background: rgba(239,68,68,0.12); color: var(--expense-color); }
        .transaction-details .desc { font-weight: 600; font-size: 0.9rem; }
        .transaction-details .meta { font-size: 0.7rem; color: var(--text-secondary); }
        .transaction-amount { font-weight: 700; font-size: 1rem; white-space: nowrap; }
        .amount-income { color: var(--income-color); } .amount-expense { color: var(--expense-color); }
        .action-btns { display: flex; gap: 4px; }
        .btn-icon { background: transparent; border: none; font-size: 1.1rem; padding: 6px 8px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); }
        .btn-icon:hover { background: var(--border); }
        .chart-toggles { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .chart-btn { padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; background: var(--card-bg); border: 2px solid var(--border); color: var(--text); cursor: pointer; transition: all var(--transition); }
        .chart-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--card-bg); backdrop-filter: var(--blur);
            border-radius: var(--radius); padding: 24px; width: 90%; max-width: 450px;
            box-shadow: var(--shadow); border: 1px solid var(--card-border);
        }
        .toast {
            position: fixed; bottom: 24px; right: 24px; background: #0f172a;
            color: #fff; padding: 12px 20px; border-radius: 12px; font-weight: 600;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4); z-index: 2000;
            animation: slideUp 0.3s; display: none;
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>💰 Finance Pro</h1>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn-outline btn-sm" id="themeBtn">🌙 Dark</button>
            <button class="btn-outline btn-sm" id="exportBtn">📥 Export</button>
            <label class="btn-outline btn-sm" style="cursor:pointer; margin:0;">📤 Import CSV <input type="file" id="csvFile" accept=".csv" style="display:none;"></label>
            <button class="btn-outline btn-sm" id="clearBtn">🗑️ Clear</button>
        </div>
    </header>

    <div class="summary-grid">
        <div class="summary-item" style="border-color:var(--income-color);"><div class="label">💰 Income</div><div class="value positive" id="totalIncome">$0</div></div>
        <div class="summary-item" style="border-color:var(--expense-color);"><div class="label">💸 Expenses</div><div class="value negative" id="totalExpense">$0</div></div>
        <div class="summary-item" style="border-color:var(--primary);"><div class="label">📊 Balance</div><div class="value" id="totalBalance">$0</div></div>
    </div>

    <div class="card">
        <h3 style="margin-bottom:12px;">➕ Add Transaction</h3>
        <form id="transactionForm">
            <div class="form-group"><label>Type</label><select id="type"><option value="expense">Expense</option><option value="income">Income</option></select></div>
            <div class="form-group"><label>Category</label><select id="category"></select></div>
            <div class="form-group"><label>Amount</label><input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required></div>
            <div class="form-group"><label>Description</label><input type="text" id="description" placeholder="e.g., Coffee" maxlength="50"></div>
            <div class="form-group"><label>Date</label><input type="date" id="date" required></div>
            <button type="submit" class="btn-primary" style="grid-column: span 2;">✅ Add</button>
        </form>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
            <h3>📈 Charts</h3>
            <div class="chart-toggles">
                <button class="chart-btn active" id="btnMonthly">Monthly</button>
                <button class="chart-btn" id="btnCategory">By Category</button>
            </div>
        </div>
        <div style="height:220px;"><canvas id="chartCanvas" style="width:100%; height:100%;"></canvas></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
            <h3>📋 Transactions</h3>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
                <select id="filterType" style="width:auto; min-width:100px;">
                    <option value="all">All</option><option value="income">Income</option><option value="expense">Expense</option>
                </select>
                <select id="filterCategory" style="width:auto; min-width:120px;"><option value="all">All Categories</option></select>
            </div>
        </div>
        <ul class="transaction-list" id="transactionList"></ul>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3>✏️ Edit Transaction</h3>
        <form id="editForm" style="display:flex; flex-direction:column; gap:10px; margin-top:12px;">
            <input type="hidden" id="editId">
            <div class="form-group"><label>Type</label><select id="editType"><option value="expense">Expense</option><option value="income">Income</option></select></div>
            <div class="form-group"><label>Category</label><select id="editCategory"></select></div>
            <div class="form-group"><label>Amount</label><input type="number" id="editAmount" step="0.01" required></div>
            <div class="form-group"><label>Description</label><input type="text" id="editDescription" maxlength="50"></div>
            <div class="form-group"><label>Date</label><input type="date" id="editDate" required></div>
            <div style="display:flex; gap:8px; justify-content:flex-end;">
                <button type="button" class="btn-outline" id="cancelEditBtn">Cancel</button>
                <button type="submit" class="btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
    (() => {
        const STORAGE_KEY = 'finance_pro_data';
        let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let currentChart = 'monthly';

        const form = document.getElementById('transactionForm');
        const typeSel = document.getElementById('type');
        const categorySel = document.getElementById('category');
        const amountInp = document.getElementById('amount');
        const descInp = document.getElementById('description');
        const dateInp = document.getElementById('date');
        const listEl = document.getElementById('transactionList');
        const totalIncomeEl = document.getElementById('totalIncome');
        const totalExpenseEl = document.getElementById('totalExpense');
        const totalBalanceEl = document.getElementById('totalBalance');
        const filterType = document.getElementById('filterType');
        const filterCat = document.getElementById('filterCategory');
        const chartCanvas = document.getElementById('chartCanvas');
        const toast = document.getElementById('toast');
        const modal = document.getElementById('editModal');
        const editForm = document.getElementById('editForm');
        const themeBtn = document.getElementById('themeBtn');
        const exportBtn = document.getElementById('exportBtn');
        const clearBtn = document.getElementById('clearBtn');
        const csvFile = document.getElementById('csvFile');
        const cancelEditBtn = document.getElementById('cancelEditBtn');

        const categoryOptions = {
            expense: ['🍔 Food','🚗 Transport','🏠 Rent','💡 Utilities','🎮 Entertainment','🛒 Shopping','💊 Health','🎓 Education','🔧 Other'],
            income: ['💼 Salary','📈 Investment','🎁 Gift','💻 Freelance','🔧 Other Income']
        };

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions)); }
        function showToast(msg) {
            toast.textContent = msg; toast.style.display = 'block';
            clearTimeout(toast._t); toast._t = setTimeout(() => toast.style.display = 'none', 2000);
        }

        function updateCategorySelect(selectEl, type) {
            const cats = categoryOptions[type] || categoryOptions.expense;
            selectEl.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function populateFilters() {
            filterCat.innerHTML = '<option value="all">All Categories</option>';
            const allCats = [...new Set(transactions.map(t => t.category))].sort();
            allCats.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c; filterCat.appendChild(opt); });
        }

        function getFiltered() {
            let filtered = [...transactions];
            if (filterType.value === 'income') filtered = filtered.filter(t => t.type === 'income');
            else if (filterType.value === 'expense') filtered = filtered.filter(t => t.type === 'expense');
            if (filterCat.value !== 'all') filtered = filtered.filter(t => t.category === filterCat.value);
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
            return filtered;
        }

        function render() {
            const filtered = getFiltered();
            if (!filtered.length) {
                listEl.innerHTML = `<li style="text-align:center; padding:30px; color:var(--text-secondary);">No transactions found.</li>`;
            } else {
                listEl.innerHTML = filtered.map(t => {
                    const isInc = t.type === 'income';
                    return `
                    <li class="transaction-item">
                        <div style="display:flex; align-items:center; gap:10px; flex:1;">
                            <div class="transaction-icon ${isInc?'icon-income':'icon-expense'}">${isInc?'💰':'💸'}</div>
                            <div class="transaction-details">
                                <span class="desc">${escapeHtml(t.description || t.category)}</span>
                                <span class="meta">${t.category} · ${new Date(t.date).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <span class="transaction-amount ${isInc?'amount-income':'amount-expense'}">${isInc?'+':'-'}$${t.amount.toFixed(2)}</span>
                        <div class="action-btns">
                            <button class="btn-icon edit-btn" data-id="${t.id}">✏️</button>
                            <button class="btn-icon delete-btn" data-id="${t.id}">🗑️</button>
                        </div>
                    </li>`;
                }).join('');
                // Attach event listeners to edit/delete buttons
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', () => editTransaction(btn.dataset.id));
                });
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => deleteTransaction(btn.dataset.id));
                });
            }
            const inc = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
            const exp = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
            totalIncomeEl.textContent = `$${inc.toFixed(2)}`;
            totalExpenseEl.textContent = `$${exp.toFixed(2)}`;
            const bal = inc - exp;
            totalBalanceEl.textContent = (bal<0?'-':'')+'$'+Math.abs(bal).toFixed(2);
            totalBalanceEl.className = 'value ' + (bal>=0?'positive':'negative');
            populateFilters();
            drawChart();
        }

        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function addTransaction(e) {
            e.preventDefault();
            const type = typeSel.value;
            const cat = categorySel.value;
            const amt = parseFloat(amountInp.value);
            const desc = descInp.value.trim();
            const date = dateInp.value;
            if (!cat || isNaN(amt) || amt<=0 || !date) { showToast('Please fill all fields correctly.'); return; }
            transactions.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), type, category: cat, amount: amt, description: desc || cat, date });
            save(); render();
            form.reset(); dateInp.value = new Date().toISOString().split('T')[0]; updateCategorySelect(categorySel, 'expense');
            showToast('Transaction added!');
        }

        function editTransaction(id) {
            const t = transactions.find(t=>t.id===id);
            if(!t) return;
            document.getElementById('editId').value = t.id;
            document.getElementById('editType').value = t.type;
            updateCategorySelect(document.getElementById('editCategory'), t.type);
            document.getElementById('editCategory').value = t.category;
            document.getElementById('editAmount').value = t.amount;
            document.getElementById('editDescription').value = t.description || '';
            document.getElementById('editDate').value = t.date;
            modal.classList.add('active');
        }

        function closeModal() { modal.classList.remove('active'); }

        editForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const t = transactions.find(t=>t.id===id);
            if(!t) return;
            t.type = document.getElementById('editType').value;
            t.category = document.getElementById('editCategory').value;
            t.amount = parseFloat(document.getElementById('editAmount').value);
            t.description = document.getElementById('editDescription').value.trim() || t.category;
            t.date = document.getElementById('editDate').value;
            save(); render(); closeModal(); showToast('Transaction updated!');
        });

        document.getElementById('editType').addEventListener('change', function() {
            updateCategorySelect(document.getElementById('editCategory'), this.value);
        });

        function deleteTransaction(id) {
            if(confirm('Delete this transaction?')) {
                transactions = transactions.filter(t=>t.id!==id);
                save(); render(); showToast('Deleted.');
            }
        }

        function resetData() {
            if(confirm('Clear ALL transactions?')) { transactions = []; save(); render(); showToast('Cleared.'); }
        }

        function exportCSV() {
            if(!transactions.length) { showToast('No data.'); return; }
            const csv = ['Type,Category,Amount,Description,Date'].concat(
                transactions.map(t=>`${t.type},"${t.category}",${t.amount.toFixed(2)},"${t.description||''}",${t.date}`)
            ).join('\n');
            const blob = new Blob([csv],{type:'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'finance.csv'; a.click();
            showToast('Exported!');
        }

        function importCSV(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n').filter(l=>l.trim());
                if(lines.length<2) { showToast('Invalid CSV.'); return; }
                const newTxns = [];
                for(let i=1;i<lines.length;i++) {
                    const parts = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if(!parts || parts.length<4) continue;
                    const type = parts[0].replace(/"/g,'').trim().toLowerCase();
                    if(type!=='income' && type!=='expense') continue;
                    const category = parts[1].replace(/"/g,'').trim();
                    const amount = parseFloat(parts[2].replace(/"/g,'').trim());
                    if(isNaN(amount)||amount<=0) continue;
                    const desc = (parts[3]||'').replace(/"/g,'').trim();
                    const date = (parts[4]||'').replace(/"/g,'').trim() || new Date().toISOString().split('T')[0];
                    newTxns.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6)+i, type, category, amount, description: desc||category, date });
                }
                if(newTxns.length) {
                    transactions = [...transactions, ...newTxns];
                    save(); render(); showToast(`Imported ${newTxns.length} transactions.`);
                } else showToast('No valid rows found.');
            };
            reader.readAsText(file);
        }

        function drawChart() {
            const ctx = chartCanvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const w = chartCanvas.parentElement.clientWidth;
            const h = 220;
            chartCanvas.width = w * dpr; chartCanvas.height = h * dpr;
            chartCanvas.style.width = w+'px'; chartCanvas.style.height = h+'px';
            ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr);
            ctx.clearRect(0,0,w,h);
            const pad = {top:20, right:20, bottom:35, left:50};
            const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;
            const textColor = getComputedStyle(document.body).getPropertyValue('--text-secondary').trim()||'#64748b';
            const gridColor = getComputedStyle(document.body).getPropertyValue('--chart-grid').trim()||'#e2e8f0';

            if(currentChart === 'monthly') {
                const now = new Date(); const months=[]; const incomeData=[], expenseData=[];
                for(let i=5;i>=0;i--) {
                    const d = new Date(now.getFullYear(), now.getMonth()-i,1);
                    months.push(d.toLocaleDateString('en-US',{month:'short',year:'2-digit'}));
                    incomeData.push(0); expenseData.push(0);
                }
                transactions.forEach(t=>{
                    const d = new Date(t.date);
                    const idx = 5 - ((now.getFullYear()-d.getFullYear())*12 + (now.getMonth()-d.getMonth()));
                    if(idx>=0 && idx<6) {
                        if(t.type==='income') incomeData[idx]+=t.amount;
                        else expenseData[idx]+=t.amount;
                    }
                });
                const maxVal = Math.max(...incomeData, ...expenseData, 1);
                const barWidth = Math.min(18, cw/18);
                const gap = cw/6;
                ctx.strokeStyle = gridColor; ctx.lineWidth=1; ctx.setLineDash([4,4]);
                for(let i=0;i<=5;i++) {
                    const y = pad.top + (ch/5)*i;
                    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(w-pad.right,y); ctx.stroke();
                    ctx.fillStyle=textColor; ctx.font='10px sans-serif'; ctx.textAlign='right';
                    ctx.fillText('$'+Math.round(maxVal - (maxVal/5)*i), pad.left-8, y+4);
                }
                ctx.setLineDash([]);
                months.forEach((_,i)=>{
                    const x0 = pad.left + gap*i + gap/2 - barWidth;
                    const hExp = (expenseData[i]/maxVal)*ch;
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--expense-color').trim()||'#ef4444';
                    ctx.beginPath(); ctx.roundRect(x0, pad.top+ch-hExp, barWidth, hExp, [4,4,0,0]); ctx.fill();
                    const hInc = (incomeData[i]/maxVal)*ch;
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--income-color').trim()||'#10b981';
                    ctx.beginPath(); ctx.roundRect(x0+barWidth+2, pad.top+ch-hInc, barWidth, hInc, [4,4,0,0]); ctx.fill();
                    ctx.fillStyle=textColor; ctx.font='10px sans-serif'; ctx.textAlign='center';
                    ctx.fillText(months[i], x0+barWidth, pad.top+ch+16);
                });
            } else {
                const catMap = new Map();
                transactions.forEach(t=>{ if(t.type==='expense') catMap.set(t.category, (catMap.get(t.category)||0)+t.amount); });
                const entries = [...catMap.entries()].sort((a,b)=>b[1]-a[1]);
                const total = entries.reduce((s,e)=>s+e[1],0) || 1;
                const cx = pad.left + cw/2, cy = pad.top + ch/2, radius = Math.min(cw,ch)/2 - 10;
                let startAngle = -Math.PI/2;
                const colors = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#6366f1','#a855f7','#ec4899'];
                entries.forEach((e,i)=>{
                    const sliceAngle = (e[1]/total)*2*Math.PI;
                    ctx.fillStyle = colors[i%colors.length];
                    ctx.beginPath(); ctx.moveTo(cx,cy);
                    ctx.arc(cx,cy,radius,startAngle, startAngle+sliceAngle);
                    ctx.closePath(); ctx.fill();
                    startAngle += sliceAngle;
                });
                if(entries.length===0){
                    ctx.fillStyle=textColor; ctx.font='14px sans-serif'; ctx.textAlign='center';
                    ctx.fillText('No expense data', cx, cy);
                }
            }
        }

        function toggleChart(type) {
            currentChart = type;
            document.getElementById('btnMonthly').classList.toggle('active', type==='monthly');
            document.getElementById('btnCategory').classList.toggle('active', type==='category');
            drawChart();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            themeBtn.innerHTML = isDark ? '☀️ Light' : '🌙 Dark';
            localStorage.setItem('finance_theme', isDark?'dark':'light');
            setTimeout(drawChart,50);
        }

        // Event Listeners
        themeBtn.addEventListener('click', toggleTheme);
        exportBtn.addEventListener('click', exportCSV);
        clearBtn.addEventListener('click', resetData);
        csvFile.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                importCSV(e.target.files[0]);
                csvFile.value = ''; // allow re-import same file
            }
        });
        cancelEditBtn.addEventListener('click', closeModal);
        document.getElementById('btnMonthly').addEventListener('click', ()=> toggleChart('monthly'));
        document.getElementById('btnCategory').addEventListener('click', ()=> toggleChart('category'));
        typeSel.addEventListener('change', ()=> updateCategorySelect(categorySel, typeSel.value));
        form.addEventListener('submit', addTransaction);
        filterType.addEventListener('change', render);
        filterCat.addEventListener('change', render);
        window.addEventListener('resize', ()=>{ clearTimeout(window._resizeT); window._resizeT = setTimeout(drawChart,150); });

        // Init
        if(localStorage.getItem('finance_theme')==='dark') { document.body.classList.add('dark'); themeBtn.innerHTML='☀️ Light'; }
        dateInp.value = new Date().toISOString().split('T')[0];
        updateCategorySelect(categorySel, 'expense');
        render();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    })();
</script>
</body>
</html>
